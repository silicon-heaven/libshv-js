# vim: sw=2
name: Publish

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  test:
    name: Publish new version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
